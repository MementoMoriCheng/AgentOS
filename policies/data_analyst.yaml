agent_role: data_analyst
permissions:
  - resource_type: path
    pattern: "examples/workspace/**"
    actions: [fs_read, fs_list]
  - resource_type: path
    pattern: "examples/workspace/out/**"
    actions: [fs_write]
sanitization_path: "examples/sanitization/pii_rules.yaml"
max_steps: 20
max_tokens: 50000
